# ===========================================================================
# nginx reverse proxy for Grafana Alloy — values.yaml
# ===========================================================================

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: nginx
  tag: "1.26-alpine"
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Vault agent injector annotations
# These go on the pod and tell Vault to inject the TLS cert, key, and
# htpasswd file before the nginx container starts.
# Adjust the role, paths, and templates to match your Vault setup.
# ---------------------------------------------------------------------------
vaultAnnotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/role: "nginx"
  # TLS cert
  vault.hashicorp.com/agent-inject-secret-tls.crt: "secret/nginx/tls"
  vault.hashicorp.com/agent-inject-template-tls.crt: |
    {{- with secret "secret/nginx/tls" -}}
    {{ .Data.data.tls_crt }}
    {{- end }}
  # TLS key
  vault.hashicorp.com/agent-inject-secret-tls.key: "secret/nginx/tls"
  vault.hashicorp.com/agent-inject-template-tls.key: |
    {{- with secret "secret/nginx/tls" -}}
    {{ .Data.data.tls_key }}
    {{- end }}
  # htpasswd
  vault.hashicorp.com/agent-inject-secret-htpasswd: "secret/nginx/htpasswd"
  vault.hashicorp.com/agent-inject-template-htpasswd: |
    {{- with secret "secret/nginx/htpasswd" -}}
    {{ .Data.data.htpasswd }}
    {{- end }}

# ---------------------------------------------------------------------------
# Paths where Vault injects the secrets (must match templates above)
# ---------------------------------------------------------------------------
vault:
  tlsCertPath:   "/vault/secrets/tls.crt"
  tlsKeyPath:    "/vault/secrets/tls.key"
  htpasswdPath:  "/vault/secrets/htpasswd"

# ---------------------------------------------------------------------------
# Alloy upstream — service name in the same namespace
# ---------------------------------------------------------------------------
alloy:
  serviceName: "alloy"   # must match your Alloy release fullname
  otlpHttpPort: 4318
  uiPort: 12345

# Alloy UI strips its own path prefix — tell it what prefix nginx uses
# so internal links in the UI resolve correctly.
# Set --server.http.ui-path-prefix=/debug/ in Alloy args to match.

# ---------------------------------------------------------------------------
# nginx config
# Templated with the values above — override the whole block if needed.
# ---------------------------------------------------------------------------
nginxConfig: |
  events {
    worker_connections 1024;
  }

  http {
    # Silence health check noise in logs
    map $request_uri $loggable {
      /healthz  0;
      default   1;
    }
    access_log /var/log/nginx/access.log combined if=$loggable;
    error_log  /var/log/nginx/error.log warn;

    server {
      listen 443 ssl;
      ssl_certificate     {{ .Values.vault.tlsCertPath }};
      ssl_certificate_key {{ .Values.vault.tlsKeyPath }};
      ssl_protocols       TLSv1.2 TLSv1.3;
      ssl_ciphers         HIGH:!aNULL:!MD5;

      auth_basic           "Alloy";
      auth_basic_user_file {{ .Values.vault.htpasswdPath }};

      # Health check — no auth so probes work
      location /healthz {
        auth_basic off;
        return 200 "ok";
        add_header Content-Type text/plain;
      }

      # ── OTLP HTTP ────────────────────────────────────────────────────
      location /otlp/ {
        proxy_pass http://{{ .Values.alloy.serviceName }}:{{ .Values.alloy.otlpHttpPort }}/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      # ── Alloy debug UI ───────────────────────────────────────────────
      location /debug/ {
        proxy_pass http://{{ .Values.alloy.serviceName }}:{{ .Values.alloy.uiPort }}/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required for Alloy UI websocket connections
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
      }
    }
  }

# ---------------------------------------------------------------------------
# Service — exposes nginx to the outside world
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  ports:
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------
replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Pod identity — leave empty for namespace default
serviceAccountName: ""

podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 101    # nginx uid in the alpine image
  runAsGroup: 101
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]

# ---------------------------------------------------------------------------
# OpenShift Route
# ---------------------------------------------------------------------------
route:
  hostname: "o11y-collector.dyn.net"

nodeSelector: {}
tolerations: []
affinity: {}
