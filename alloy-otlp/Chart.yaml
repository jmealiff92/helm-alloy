apiVersion: v2
name: alloy-otlp
description: >
  Grafana Alloy configured as an OTLP receiver (gRPC 4317 + HTTP 4318).
  Routes to this chart from the alloy-gateway nginx via /otlp/*.
  Sources the alloy library chart for shared Deployment/Service/ConfigMap templates.
type: application
version: 0.1.0
appVersion: "1.7.0"
dependencies:
  - name: alloy
    version: 0.1.0
    repository: file://../alloy-chart
