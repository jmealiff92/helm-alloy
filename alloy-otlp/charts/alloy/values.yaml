# ===========================================================================
# Grafana Alloy — values.yaml
#
# Deployable standalone and reusable as a dependency by child charts.
#
# Standalone:  helm install my-alloy ./alloy-chart
#              enabled: true  → Deployment + Service + optional Route rendered.
#
# As sub-chart: child chart sets  alloy.enabled: false  in its own values.yaml
#              to suppress these resources while still calling the shared named
#              templates (alloy.deployment, alloy.service, alloy.configmap).
# ===========================================================================

# ---------------------------------------------------------------------------
# Render this chart's own Deployment, Service, ConfigMap, and Route.
# Set to false when this chart is sourced as a dependency by alloy-otlp,
# alloy-prom, or alloy-discovery to avoid duplicate resource creation.
# ---------------------------------------------------------------------------
enabled: true

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: grafana/alloy
  tag: "v1.7.0"
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Alloy River config
# The configmap template renders this as config.alloy inside a ConfigMap.
# ---------------------------------------------------------------------------
config:
  content: |-
    logging {
      level  = "info"
      format = "logfmt"
    }

    otelcol.receiver.otlp "default" {
      grpc { endpoint = "0.0.0.0:4317" }
      http { endpoint = "0.0.0.0:4318" }

      output {
        metrics = [otelcol.exporter.otlp.default.input]
        logs    = [otelcol.exporter.otlp.default.input]
        traces  = [otelcol.exporter.otlp.default.input]
      }
    }

    otelcol.exporter.otlp "default" {
      client {
        endpoint = "http://otel-collector:4317"
        tls { insecure = true }
      }
    }

# ---------------------------------------------------------------------------
# Pod identity
# Leave empty to use the namespace default ServiceAccount.
# ---------------------------------------------------------------------------
serviceAccountName: ""

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Storage path for Alloy's WAL / internal state
storagePath: /var/lib/alloy

# ---------------------------------------------------------------------------
# Service (ClusterIP)
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  ports:
    - name: alloy-ui
      port: 12345
      targetPort: 12345
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

# ---------------------------------------------------------------------------
# OpenShift Route (optional)
# Exposes Alloy directly without a separate nginx gateway.
# TLS is terminated at the OpenShift router (edge termination) because
# the Alloy HTTP server does not do TLS on its own.
# ---------------------------------------------------------------------------
route:
  enabled: false
  hostname: ""
  # termination: edge | reencrypt | passthrough
  termination: edge
  # targetPort matches one of the service port names above
  targetPort: alloy-ui

# ---------------------------------------------------------------------------
# Pod extras
# ---------------------------------------------------------------------------
podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 473
  runAsGroup: 473
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

nodeSelector: {}
tolerations: []
affinity: {}

# Extra args appended to the Alloy run command.
# e.g. when nginx is proxying the UI under a subpath:
#   extraArgs:
#     - --server.http.ui-path-prefix=/debug/
extraArgs: []

# Go runtime tuning — GOMAXPROCS is wired to limits.cpu via the downward API
# so Go doesn't over-schedule goroutines against the CPU limit.
extraEnv:
  - name: GOMAXPROCS
    valueFrom:
      resourceFieldRef:
        resource: limits.cpu

extraVolumes: []
extraVolumeMounts: []
