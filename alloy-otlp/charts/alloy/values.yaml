# ===========================================================================
# Grafana Alloy — library chart default values
#
# This file documents the values contract expected by the shared named
# templates (alloy.deployment, alloy.service, alloy.configmap).
# Child charts (alloy-otlp, alloy-prom, alloy-discovery) override these
# in their own values.yaml.
# ===========================================================================

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: grafana/alloy
  tag: "v1.7.0"
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Alloy River config
# The configmap template renders this as config.alloy inside a ConfigMap.
# ---------------------------------------------------------------------------
config:
  content: |-
    logging {
      level  = "info"
      format = "logfmt"
    }

# ---------------------------------------------------------------------------
# Pod identity
# Leave empty to use the namespace default ServiceAccount.
# ---------------------------------------------------------------------------
serviceAccountName: ""

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Storage path for Alloy's WAL / internal state
storagePath: /var/lib/alloy

# ---------------------------------------------------------------------------
# Service (ClusterIP)
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  ports:
    - name: alloy-ui
      port: 12345
      targetPort: 12345
      protocol: TCP

# ---------------------------------------------------------------------------
# Pod extras
# ---------------------------------------------------------------------------
podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 473
  runAsGroup: 473
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

nodeSelector: {}
tolerations: []
affinity: {}

# Extra args appended to the Alloy run command.
# e.g. when nginx is proxying the UI under a subpath:
#   extraArgs:
#     - --server.http.ui-path-prefix=/debug/
extraArgs: []

# Go runtime tuning — GOMAXPROCS is wired to limits.cpu via the downward API
# so Go doesn't over-schedule goroutines against the CPU limit.
extraEnv:
  - name: GOMAXPROCS
    valueFrom:
      resourceFieldRef:
        resource: limits.cpu

extraVolumes: []
extraVolumeMounts: []
