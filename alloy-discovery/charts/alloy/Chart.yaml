apiVersion: v2
name: alloy
description: >
  Grafana Alloy — deployable standalone chart and shared template library.
  When deployed directly (enabled: true) renders Deployment, Service, and
  optionally an OpenShift Route. When sourced as a dependency by alloy-otlp,
  alloy-prom, or alloy-discovery the sub-chart's own resources are suppressed
  (alloy.enabled: false) while its named templates remain available to the
  parent chart.
type: application
version: 0.1.0
appVersion: "1.7.0"
