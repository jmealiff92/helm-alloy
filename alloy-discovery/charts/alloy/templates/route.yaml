{{- if and .Values.enabled .Values.route.enabled }}
# OpenShift Route — exposes the Alloy HTTP server externally.
# Remove this file or set route.enabled: false if not using OpenShift.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "alloy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alloy.labels" . | nindent 4 }}
spec:
  {{- if .Values.route.hostname }}
  host: {{ .Values.route.hostname }}
  {{- end }}
  port:
    targetPort: {{ .Values.route.targetPort }}
  tls:
    termination: {{ .Values.route.termination }}
  to:
    kind: Service
    name: {{ include "alloy.fullname" . }}
    weight: 100
  wildcardPolicy: None
{{- end }}
