apiVersion: v2
name: alloy-discovery
description: >
  Grafana Alloy configured for Kubernetes cluster discovery and scraping.
  Runs under a dedicated ServiceAccount with a namespace-scoped Role granting
  read access to pods, services, and endpoints for scrape target discovery.
  Sources the alloy library chart for shared Deployment/Service/ConfigMap templates.
type: application
version: 0.1.0
appVersion: "1.7.0"
dependencies:
  - name: alloy
    version: 0.1.0
    repository: file://../alloy-chart
