# ===========================================================================
# Grafana Alloy — values.yaml
#
# Standalone:   helm install my-alloy ./alloy-chart
# As sub-chart: child chart declares this as a dependency and overrides
#               values under the alloy: key in its own values.yaml.
# ===========================================================================

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: grafana/alloy
  tag: "v1.7.0"
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Alloy River config
# The chart always creates a ConfigMap from this content.
# Override config.content in the child chart's values under alloy.config.content
# ---------------------------------------------------------------------------
config:
  content: |-
    logging {
      level  = "info"
      format = "logfmt"
    }

    otelcol.receiver.otlp "default" {
      grpc { endpoint = "0.0.0.0:4317" }
      http { endpoint = "0.0.0.0:4318" }

      output {
        metrics = [otelcol.exporter.otlp.default.input]
        logs    = [otelcol.exporter.otlp.default.input]
        traces  = [otelcol.exporter.otlp.default.input]
      }
    }

    otelcol.exporter.otlp "default" {
      client {
        endpoint = "http://otel-collector:4317"
        tls { insecure = true }
      }
    }

# ---------------------------------------------------------------------------
# Pod identity
# Leave empty to use the namespace default ServiceAccount.
# When set, a ServiceAccount is created with this name.
# ---------------------------------------------------------------------------
serviceAccountName: ""

# ---------------------------------------------------------------------------
# Workload type: Deployment or StatefulSet
# Use StatefulSet when you need stable storage (WAL, WAL replay, scrape state).
# alloy-prom and alloy-discovery default to StatefulSet.
# ---------------------------------------------------------------------------
workloadType: Deployment

# ---------------------------------------------------------------------------
# Deployment / StatefulSet
# ---------------------------------------------------------------------------
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Storage path for Alloy's WAL / internal state
storagePath: /var/lib/alloy

# ---------------------------------------------------------------------------
# Persistent storage — only active when workloadType is StatefulSet.
#
# Three modes:
#   existingClaim set   → mount that PVC directly (no dynamic provisioning)
#   enabled: true       → create a volumeClaimTemplate (dynamic provisioning)
#   enabled: false      → emptyDir (ephemeral, same behaviour as Deployment)
#
# storageClass examples:
#   ""              cluster default StorageClass
#   "sc-ontap-nas"  NetApp ONTAP NAS (RWX-capable)
# ---------------------------------------------------------------------------
persistence:
  enabled: false
  existingClaim: ""
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi

# ---------------------------------------------------------------------------
# Service (ClusterIP)
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  ports:
    - name: alloy-ui
      port: 12345
      targetPort: 12345
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

# ---------------------------------------------------------------------------
# OpenShift Route (optional)
# ---------------------------------------------------------------------------
route:
  enabled: false
  hostname: ""
  termination: edge
  targetPort: alloy-ui

# ---------------------------------------------------------------------------
# RBAC
# Creates a namespace-scoped Role and RoleBinding for the ServiceAccount.
# Only takes effect when serviceAccountName is also set.
# ---------------------------------------------------------------------------
rbac:
  enabled: false
  rules: []

# ---------------------------------------------------------------------------
# Pod extras
# ---------------------------------------------------------------------------
podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 473
  runAsGroup: 473
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

nodeSelector: {}
tolerations: []
affinity: {}

# Extra args appended to the Alloy run command
extraArgs: []

extraEnv:
  - name: GOMAXPROCS
    valueFrom:
      resourceFieldRef:
        resource: limits.cpu

extraVolumes: []
extraVolumeMounts: []
