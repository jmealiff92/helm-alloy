{{- $isStatefulSet := eq (.Values.workloadType | default "Deployment") "StatefulSet" }}
{{- /*
  $useVCT  — create a volumeClaimTemplate for dynamic PVC provisioning.
  $useExisting — mount an existing PVC by name as a regular volume.
  Otherwise fall back to emptyDir (including all Deployment workloads).
*/}}
{{- $useVCT      := and $isStatefulSet .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
{{- $useExisting := and (not (empty .Values.persistence.existingClaim)) }}
apiVersion: apps/v1
kind: {{ ternary "StatefulSet" "Deployment" $isStatefulSet }}
metadata:
  name: {{ include "alloy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alloy.labels" . | nindent 4 }}
spec:
  {{- if not (and .Values.autoscaling.enabled (not $isStatefulSet)) }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- if $isStatefulSet }}
  serviceName: {{ include "alloy.fullname" . }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "alloy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Rolls pods automatically when config content changes
        checksum/config: {{ .Values.config.content | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "alloy.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.serviceAccountName }}
      serviceAccountName: {{ .Values.serviceAccountName }}
      {{- end }}

      volumes:
        - name: config
          configMap:
            name: {{ include "alloy.fullname" . }}-config
        {{- if $useExisting }}
        - name: storage
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
        {{- else if not $useVCT }}
        - name: storage
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

      containers:
        # ── Grafana Alloy ────────────────────────────────────────────────
        - name: alloy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path={{ .Values.storagePath }}
            - --server.http.listen-addr=0.0.0.0:12345
            {{- range .Values.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            {{- range .Values.service.ports }}
            - name: {{ .name }}
              containerPort: {{ .targetPort }}
              protocol: {{ .protocol }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            - name: storage
              mountPath: {{ .Values.storagePath }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 12345
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 12345
            initialDelaySeconds: 20
            periodSeconds: 20

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

  {{- if $useVCT }}
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: [{{ .Values.persistence.accessMode | default "ReadWriteOnce" }}]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | default "10Gi" }}
  {{- end }}
