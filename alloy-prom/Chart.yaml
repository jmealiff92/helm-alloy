apiVersion: v2
name: alloy-prom
description: >
  Grafana Alloy configured as a Prometheus remote write receiver (port 9009).
  Uses alloy-chart as a dependency; all resources are rendered by the
  sub-chart. Override alloy.config.content and alloy.service.ports here.
type: application
version: 0.1.0
appVersion: "1.7.0"
dependencies:
  - name: alloy
    version: 0.1.0
    repository: file://../alloy-chart
