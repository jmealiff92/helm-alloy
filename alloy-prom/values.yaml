# ===========================================================================
# alloy-prom — values.yaml
#
# Grafana Alloy configured as a Prometheus remote write receiver.
# The alloy-gateway nginx routes /prometheus/api/v1/push to this chart's
# service on port 9009.
# ===========================================================================

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: grafana/alloy
  tag: "v1.7.0"
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Alloy River config — Prometheus remote write receiver
# ---------------------------------------------------------------------------
config:
  content: |-
    logging {
      level  = "info"
      format = "logfmt"
    }

    // Receive Prometheus remote write from the gateway (proxied as /api/v1/write)
    prometheus.receive_http "default" {
      http {
        listen_address = "0.0.0.0"
        listen_port    = 9009
      }

      output {
        metrics = [prometheus.remote_write.default.receiver]
      }
    }

    prometheus.remote_write "default" {
      endpoint {
        // Override url in values.yaml to point at your Prometheus / Mimir / Thanos
        url = "http://prometheus:9090/api/v1/write"
      }
    }

# ---------------------------------------------------------------------------
# Pod identity — uses namespace default ServiceAccount
# ---------------------------------------------------------------------------
serviceAccountName: ""

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

storagePath: /var/lib/alloy

# ---------------------------------------------------------------------------
# Service — ClusterIP (gateway proxies to port 9009)
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  ports:
    - name: alloy-ui
      port: 12345
      targetPort: 12345
      protocol: TCP
    - name: prom-http
      port: 9009
      targetPort: 9009
      protocol: TCP

# ---------------------------------------------------------------------------
# Pod extras
# ---------------------------------------------------------------------------
podAnnotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 473
  runAsGroup: 473
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

nodeSelector: {}
tolerations: []
affinity: {}

extraArgs: []

extraEnv:
  - name: GOMAXPROCS
    valueFrom:
      resourceFieldRef:
        resource: limits.cpu

extraVolumes: []
extraVolumeMounts: []
