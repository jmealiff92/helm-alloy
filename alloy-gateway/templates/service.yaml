apiVersion: v1
kind: Service
metadata:
  name: {{ include "alloy-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "alloy-gateway.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "alloy-gateway.selectorLabels" . | nindent 4 }}
  ports:
    {{- range .Values.service.ports }}
    - name: {{ .name }}
      port: {{ .port }}
      targetPort: {{ .targetPort }}
      protocol: {{ .protocol }}
    {{- end }}
